name: Sentinela Londrina CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24.x"
  # Força o uso do Node 24 para evitar avisos de depreciação
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies (g++)
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ build-essential

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv google-genai pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Tests (Python)
      run: pytest src/parser/test_ai_scan.py
      continue-on-error: true

    - name: Run Pipeline
      run: |
        chmod +x run_pipeline.sh
        ./run_pipeline.sh
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-results
        path: |
          src/frontend/public/result.json
          *.log
      if: always() # Garante que os logs subam mesmo se houver erro
